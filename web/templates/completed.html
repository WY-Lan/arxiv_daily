<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核已完成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .completed-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .status-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .status-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 15px;
        }

        .status-message {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .status-approved {
            background: #d1fae5;
            color: #065f46;
        }

        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .reviewed-time {
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="completed-card">
        <div class="status-icon">✅</div>
        <h1 class="status-title">审核已完成</h1>
        <p class="status-message">该审核会话已处理完毕</p>

        <span class="status-badge status-{{ status }}">
            {% if status == 'approved' %}已通过{% else %}已驳回{% endif %}
        </span>

        {% if reviewed_at %}
        <p class="reviewed-time">审核时间: {{ reviewed_at }}</p>
        {% endif %}
    </div>
</body>
</html>
